name: Build Gateway Image
on:
  workflow_dispatch:
  schedule:
    # Rebuild regularly so `FROM ghcr.io/openclaw/openclaw:latest` actually
    # picks up upstream OpenClaw fixes even when our bridge code has not changed.
    - cron: '17 7 * * *'
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          pull: true
          push: true
          tags: ghcr.io/absurdfounder/crabhq-gateway:latest
